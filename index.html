<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard รายรับ-รายจ่าย</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2535;
    --border: #2a3047;
    --income: #00e5a0;
    --expense: #ff4f6b;
    --neutral: #7b8db0;
    --text: #e8edf8;
    --text-dim: #8a96b0;
    --accent: #4f8fff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--income);
    box-shadow: 0 0 8px var(--income);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--income); }
    50% { opacity: 0.6; box-shadow: 0 0 16px var(--income); }
  }

  .logo h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  #last-update {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
  }

  #refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    transition: all 0.2s;
  }

  #refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Main layout */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  /* Loading */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
    color: var(--text-dim);
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--income);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* KPI cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .kpi-card.income::before { background: var(--income); }
  .kpi-card.expense::before { background: var(--expense); }
  .kpi-card.balance::before { background: var(--accent); }

  .kpi-label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .kpi-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
  }

  .kpi-card.income .kpi-value { color: var(--income); }
  .kpi-card.expense .kpi-value { color: var(--expense); }
  .kpi-card.balance .kpi-value { color: var(--accent); }

  .kpi-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  /* Charts row */
  .charts-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* Table */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    padding: 10px 12px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }

  td {
    padding: 11px 12px;
    border-bottom: 1px solid rgba(42,48,71,0.5);
    color: var(--text);
    font-size: 13px;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .badge-income { background: rgba(0,229,160,0.12); color: var(--income); }
  .badge-expense { background: rgba(255,79,107,0.12); color: var(--expense); }

  .amount-income { color: var(--income); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  .amount-expense { color: var(--expense); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

  /* Error */
  #error {
    display: none;
    background: rgba(255,79,107,0.08);
    border: 1px solid rgba(255,79,107,0.3);
    border-radius: 10px;
    padding: 20px;
    color: var(--expense);
    text-align: center;
    margin: 20px 0;
  }

  /* Responsive */
  @media (max-width: 768px) {
    header { padding: 14px 16px; }
    main { padding: 16px; }
    .kpi-grid { grid-template-columns: 1fr; gap: 12px; }
    .charts-row { grid-template-columns: 1fr; }
    .kpi-value { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <h1>รายรับ-รายจ่าย Dashboard</h1>
  </div>
  <div class="header-right">
    <span id="last-update">กำลังโหลด...</span>
    <button id="refresh-btn" onclick="loadData()">↻ รีเฟรช</button>
  </div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <span>กำลังดึงข้อมูลจาก Google Sheets...</span>
  </div>

  <div id="error">⚠ ไม่สามารถดึงข้อมูลได้ กรุณาตรวจสอบ Apps Script URL</div>

  <div id="content" style="display:none">

    <!-- KPI -->
    <div class="kpi-grid">
      <div class="kpi-card income">
        <div class="kpi-label">รายรับทั้งหมด</div>
        <div class="kpi-value" id="total-income">-</div>
        <div class="kpi-sub" id="income-count">-</div>
      </div>
      <div class="kpi-card expense">
        <div class="kpi-label">รายจ่ายทั้งหมด</div>
        <div class="kpi-value" id="total-expense">-</div>
        <div class="kpi-sub" id="expense-count">-</div>
      </div>
      <div class="kpi-card balance">
        <div class="kpi-label">คงเหลือสุทธิ</div>
        <div class="kpi-value" id="balance">-</div>
        <div class="kpi-sub" id="balance-sub">-</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="card">
        <div class="card-title">รายรับ vs รายจ่าย รายวัน</div>
        <canvas id="barChart" height="200"></canvas>
      </div>
      <div class="card">
        <div class="card-title">สัดส่วนรายรับ/จ่าย</div>
        <canvas id="donutChart" height="200"></canvas>
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="card-title">รายการล่าสุด</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>วันที่</th>
              <th>รายการ</th>
              <th>จำนวน</th>
              <th>ราคา/หน่วย</th>
              <th>รวม</th>
              <th>ประเภท</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbykGgP5k8pGlyb20qcoe-OMCjKb2oPPDbavB0k2svLGyAaIpN0yNK7hhJ9t5mji1WNH/exec";

let barChartInstance = null;
let donutChartInstance = null;

function fmt(n) {
  return Number(n).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function fmtDate(str) {
  try {
    const d = new Date(str);
    if (isNaN(d)) return str;
    return d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: '2-digit' });
  } catch { return str; }
}

function parsePrice(val) {
  const n = parseFloat(String(val).replace(/,/g, ''));
  return isNaN(n) ? 0 : n;
}

function parseQty(val) {
  const n = parseFloat(String(val).replace(/,/g, ''));
  return isNaN(n) ? 1 : n;
}

function isIncome(type) {
  return String(type).toLowerCase().trim() === 'income';
}

async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('content').style.display = 'none';
  document.getElementById('error').style.display = 'none';

  try {
    const res = await fetch(API_URL + '?t=' + Date.now());
    const raw = await res.json();

    // Normalize: handle array or object
    let rows = Array.isArray(raw) ? raw : (raw.data || []);

    // Filter valid rows
    rows = rows.filter(r => r && (r.item || r.รายการ));

    if (rows.length === 0) throw new Error('No data');

    renderDashboard(rows);

    document.getElementById('last-update').textContent =
      'อัปเดต ' + new Date().toLocaleTimeString('th-TH');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

  } catch (e) {
    console.error(e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent =
      '⚠ ไม่สามารถดึงข้อมูลได้: ' + e.message + ' — ตรวจสอบว่า Apps Script Deploy เป็น Anyone';
  }
}

function renderDashboard(rows) {
  // KPIs
  let totalIncome = 0, totalExpense = 0, incomeCount = 0, expenseCount = 0;

  rows.forEach(r => {
    const price = parsePrice(r.price || r.ราคา || 0);
    const qty = parseQty(r.quantity || r.จำนวน || 1);
    const total = price * qty;
    const type = r.type || r.ประเภท || '';

    if (isIncome(type)) {
      totalIncome += total;
      incomeCount++;
    } else {
      totalExpense += total;
      expenseCount++;
    }
  });

  const balance = totalIncome - totalExpense;

  document.getElementById('total-income').textContent = '฿' + fmt(totalIncome);
  document.getElementById('income-count').textContent = incomeCount + ' รายการ';
  document.getElementById('total-expense').textContent = '฿' + fmt(totalExpense);
  document.getElementById('expense-count').textContent = expenseCount + ' รายการ';
  document.getElementById('balance').textContent = (balance >= 0 ? '+' : '') + '฿' + fmt(balance);
  document.getElementById('balance-sub').textContent = balance >= 0 ? 'กำไร' : 'ขาดทุน';

  // Group by date
  const dateMap = {};
  rows.forEach(r => {
    const raw = r.date || r.Date || r.วันที่ || '';
    const d = fmtDate(raw);
    if (!dateMap[d]) dateMap[d] = { income: 0, expense: 0 };
    const price = parsePrice(r.price || r.ราคา || 0);
    const qty = parseQty(r.quantity || r.จำนวน || 1);
    const total = price * qty;
    const type = r.type || r.ประเภท || '';
    if (isIncome(type)) dateMap[d].income += total;
    else dateMap[d].expense += total;
  });

  const labels = Object.keys(dateMap);
  const incomeData = labels.map(l => dateMap[l].income);
  const expenseData = labels.map(l => dateMap[l].expense);

  // Bar Chart
  if (barChartInstance) barChartInstance.destroy();
  const ctx1 = document.getElementById('barChart').getContext('2d');
  barChartInstance = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'รายรับ',
          data: incomeData,
          backgroundColor: 'rgba(0,229,160,0.7)',
          borderRadius: 4,
          borderSkipped: false,
        },
        {
          label: 'รายจ่าย',
          data: expenseData,
          backgroundColor: 'rgba(255,79,107,0.7)',
          borderRadius: 4,
          borderSkipped: false,
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: '#8a96b0', font: { size: 12 } }
        },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label + ': ฿' + fmt(ctx.raw)
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#8a96b0', font: { size: 11 } },
          grid: { color: '#2a3047' }
        },
        y: {
          ticks: {
            color: '#8a96b0',
            font: { size: 11 },
            callback: v => '฿' + fmt(v)
          },
          grid: { color: '#2a3047' }
        }
      }
    }
  });

  // Donut
  if (donutChartInstance) donutChartInstance.destroy();
  const ctx2 = document.getElementById('donutChart').getContext('2d');
  donutChartInstance = new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: ['รายรับ', 'รายจ่าย'],
      datasets: [{
        data: [totalIncome, totalExpense],
        backgroundColor: ['rgba(0,229,160,0.8)', 'rgba(255,79,107,0.8)'],
        borderColor: ['#00e5a0', '#ff4f6b'],
        borderWidth: 2,
        hoverOffset: 8
      }]
    },
    options: {
      responsive: true,
      cutout: '65%',
      plugins: {
        legend: {
          labels: { color: '#8a96b0', font: { size: 12 } }
        },
        tooltip: {
          callbacks: {
            label: ctx => ctx.label + ': ฿' + fmt(ctx.raw)
          }
        }
      }
    }
  });

  // Table (latest 30)
  const sorted = [...rows].sort((a, b) => {
    const da = new Date(a.date || a.Date || a.วันที่ || 0);
    const db = new Date(b.date || b.Date || b.วันที่ || 0);
    return db - da;
  }).slice(0, 30);

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  sorted.forEach(r => {
    const type = r.type || r.ประเภท || '';
    const inc = isIncome(type);
    const price = parsePrice(r.price || r.ราคา || 0);
    const qty = parseQty(r.quantity || r.จำนวน || 1);
    const total = price * qty;
    const dateRaw = r.date || r.Date || r.วันที่ || '';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="white-space:nowrap;color:var(--text-dim);font-size:12px">${fmtDate(dateRaw)}</td>
      <td>${r.item || r.รายการ || '-'}</td>
      <td style="text-align:center">${qty}</td>
      <td class="${inc ? 'amount-income' : 'amount-expense'}">฿${fmt(price)}</td>
      <td class="${inc ? 'amount-income' : 'amount-expense'}" style="font-weight:600">฿${fmt(total)}</td>
      <td><span class="badge ${inc ? 'badge-income' : 'badge-expense'}">${inc ? 'รับ' : 'จ่าย'}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

// Auto refresh ทุก 5 นาที
setInterval(loadData, 5 * 60 * 1000);
loadData();
</script>
</body>
</html>
