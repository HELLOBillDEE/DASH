<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard รายรับ-รายจ่าย</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
  :root {
    --bg:#0f1117; --surface:#181c27; --surface2:#1f2535; --border:#2a3047;
    --income:#00e5a0; --expense:#ff4f6b; --text:#e8edf8; --text-dim:#8a96b0; --accent:#4f8fff;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans Thai',sans-serif; min-height:100vh; }

  header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:14px 20px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100; gap:10px; flex-wrap:wrap;
  }
  .logo { display:flex; align-items:center; gap:9px; }
  .logo-dot {
    width:9px; height:9px; border-radius:50%; background:var(--income);
    box-shadow:0 0 8px var(--income); animation:pulse 2s ease-in-out infinite; flex-shrink:0;
  }
  @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--income)} 50%{opacity:.6;box-shadow:0 0 16px var(--income)} }
  .logo h1 { font-size:15px; font-weight:600; }
  .header-right { display:flex; align-items:center; gap:9px; flex-wrap:wrap; }

  .sel-wrap { position:relative; }
  #month-select {
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:8px 34px 8px 13px; border-radius:8px; font-size:14px;
    font-family:'IBM Plex Sans Thai',sans-serif; cursor:pointer;
    appearance:none; -webkit-appearance:none; outline:none; min-width:155px; transition:border-color .2s;
  }
  #month-select:focus { border-color:var(--accent); }
  .sel-arrow { position:absolute; right:10px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--text-dim); font-size:10px; }

  #refresh-btn {
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:8px 13px; border-radius:8px; font-size:14px; cursor:pointer;
    font-family:'IBM Plex Sans Thai',sans-serif; transition:all .2s;
  }
  #refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
  #last-update { font-size:11px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; white-space:nowrap; }

  main { max-width:1100px; margin:0 auto; padding:22px 16px; }

  .month-badge {
    display:inline-flex; align-items:center; gap:7px;
    background:rgba(79,143,255,.1); border:1px solid rgba(79,143,255,.25);
    color:var(--accent); padding:5px 15px; border-radius:20px;
    font-size:13px; font-weight:600; margin-bottom:18px;
  }

  #loading {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:50vh; gap:14px; color:var(--text-dim);
  }
  .spinner {
    width:32px; height:32px; border:3px solid var(--border);
    border-top-color:var(--income); border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:13px; margin-bottom:18px; }
  .kpi-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:18px; position:relative; overflow:hidden;
  }
  .kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .kpi-card.income::before { background:var(--income); }
  .kpi-card.expense::before { background:var(--expense); }
  .kpi-card.balance::before { background:var(--accent); }
  .kpi-label { font-size:11px; color:var(--text-dim); letter-spacing:.07em; text-transform:uppercase; margin-bottom:9px; }
  .kpi-value { font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600; line-height:1; }
  .kpi-card.income .kpi-value { color:var(--income); }
  .kpi-card.expense .kpi-value { color:var(--expense); }
  .kpi-card.balance .kpi-value { color:var(--accent); }
  .kpi-sub { font-size:11px; color:var(--text-dim); margin-top:6px; }

  .charts-row { display:grid; grid-template-columns:2fr 1fr; gap:13px; margin-bottom:18px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; }
  .card-title { font-size:11px; font-weight:600; color:var(--text-dim); letter-spacing:.06em; text-transform:uppercase; margin-bottom:14px; }

  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:9px 11px; color:var(--text-dim); font-size:11px; letter-spacing:.06em; text-transform:uppercase; border-bottom:1px solid var(--border); font-weight:500; }
  td { padding:10px 11px; border-bottom:1px solid rgba(42,48,71,.5); font-size:13px; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,.02); }

  .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .badge-income { background:rgba(0,229,160,.12); color:var(--income); }
  .badge-expense { background:rgba(255,79,107,.12); color:var(--expense); }
  .amount-income { color:var(--income); font-family:'IBM Plex Mono',monospace; }
  .amount-expense { color:var(--expense); font-family:'IBM Plex Mono',monospace; }

  #error { display:none; background:rgba(255,79,107,.08); border:1px solid rgba(255,79,107,.3); border-radius:10px; padding:18px; color:var(--expense); text-align:center; margin:16px 0; }
  .empty { text-align:center; padding:36px; color:var(--text-dim); font-size:14px; }

  @media(max-width:660px){
    .kpi-grid { grid-template-columns:1fr 1fr; }
    .kpi-card.balance { grid-column:span 2; }
    .charts-row { grid-template-columns:1fr; }
    .kpi-value { font-size:17px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <h1>รายรับ-รายจ่าย</h1>
  </div>
  <div class="header-right">
    <div class="sel-wrap">
      <select id="month-select" onchange="onMonthChange()"><option value="">กำลังโหลด...</option></select>
      <span class="sel-arrow">▼</span>
    </div>
    <button id="refresh-btn" onclick="loadData()">↻ รีเฟรช</button>
    <span id="last-update"></span>
  </div>
</header>

<main>
  <div id="loading"><div class="spinner"></div><span>กำลังดึงข้อมูล...</span></div>
  <div id="error"></div>
  <div id="content" style="display:none">
    <div class="month-badge" id="month-badge">📅 —</div>
    <div class="kpi-grid">
      <div class="kpi-card income">
        <div class="kpi-label">รายรับ</div>
        <div class="kpi-value" id="total-income">-</div>
        <div class="kpi-sub" id="income-count">-</div>
      </div>
      <div class="kpi-card expense">
        <div class="kpi-label">รายจ่าย</div>
        <div class="kpi-value" id="total-expense">-</div>
        <div class="kpi-sub" id="expense-count">-</div>
      </div>
      <div class="kpi-card balance">
        <div class="kpi-label">คงเหลือ</div>
        <div class="kpi-value" id="balance">-</div>
        <div class="kpi-sub" id="balance-sub">-</div>
      </div>
    </div>
    <div class="charts-row">
      <div class="card">
        <div class="card-title">รายรับ vs รายจ่าย รายวัน</div>
        <canvas id="barChart" height="190"></canvas>
      </div>
      <div class="card">
        <div class="card-title">สัดส่วน</div>
        <canvas id="donutChart" height="190"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">รายการในเดือนนี้</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>วันที่</th><th>รายการ</th><th>จำนวน</th><th>ราคา/หน่วย</th><th>รวม</th><th>ประเภท</th></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbykGgP5k8pGlyb20qcoe-OMCjKb2oPPDbavB0k2svLGyAaIpN0yNK7hhJ9t5mji1WNH/exec";
const MONTH_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

let allRows = [];
let barChart = null, donutChart = null;

function fmt(n) { return Number(n).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:0}); }

function parseDate(str) {
  if (!str) return null;
  const s = String(str).trim();
  const m1 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m1) return new Date(+m1[3], +m1[2]-1, +m1[1]);
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function fmtDay(d) { return d ? d.getDate() + ' ' + MONTH_TH[d.getMonth()] : '-'; }
function parsePrice(v) { const n=parseFloat(String(v).replace(/,/g,'')); return isNaN(n)?0:n; }
function parseQty(v) { const n=parseFloat(String(v).replace(/,/g,'')); return isNaN(n)?1:n; }
function isIncome(t) { return String(t).toLowerCase().trim()==='income'; }
function getMonthKey(d) { return d ? d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0') : null; }
function monthLabel(k) { const [y,m]=k.split('-'); return MONTH_TH[+m-1]+' '+(+y+543); }

async function loadData() {
  document.getElementById('loading').style.display='flex';
  document.getElementById('content').style.display='none';
  document.getElementById('error').style.display='none';
  try {
    const res = await fetch(API_URL+'?t='+Date.now());
    const raw = await res.json();
    let rows = Array.isArray(raw) ? raw : (raw.data||[]);
    allRows = rows
      .filter(r => r && (r.item||r.รายการ||r.Item))
      .map(r => ({ ...r, _date: parseDate(r.date||r.Date||r.วันที่||'') }));
    if (!allRows.length) throw new Error('ไม่พบข้อมูลในชีต');
    buildDropdown();
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('th-TH');
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
  } catch(e) {
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='block';
    document.getElementById('error').textContent = '⚠ '+e.message;
  }
}

function buildDropdown() {
  const keys = [...new Set(allRows.map(r=>getMonthKey(r._date)).filter(Boolean))].sort().reverse();
  const currentKey = getMonthKey(new Date());
  const sel = document.getElementById('month-select');
  sel.innerHTML = '';
  keys.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = monthLabel(k) + (k===currentKey ? ' · เดือนนี้' : '');
    sel.appendChild(opt);
  });
  sel.value = keys.includes(currentKey) ? currentKey : keys[0];
  renderMonth(sel.value);
}

function onMonthChange() { renderMonth(document.getElementById('month-select').value); }

function renderMonth(key) {
  const rows = allRows.filter(r => getMonthKey(r._date)===key);
  document.getElementById('month-badge').textContent = '📅 ' + monthLabel(key);

  let tIncome=0, tExpense=0, nIn=0, nEx=0;
  rows.forEach(r => {
    const price=parsePrice(r.price||r.ราคา||0);
    const qty=parseQty(r.quantity||r.จำนวน||1);
    const total=price*qty;
    if (isIncome(r.type||r.ประเภท||'')) { tIncome+=total; nIn++; }
    else { tExpense+=total; nEx++; }
  });
  const bal = tIncome - tExpense;

  document.getElementById('total-income').textContent = '฿'+fmt(tIncome);
  document.getElementById('income-count').textContent = nIn+' รายการ';
  document.getElementById('total-expense').textContent = '฿'+fmt(tExpense);
  document.getElementById('expense-count').textContent = nEx+' รายการ';
  document.getElementById('balance').textContent = (bal>=0?'+':'')+' ฿'+fmt(bal);
  document.getElementById('balance-sub').textContent = bal>=0 ? '✓ กำไร' : '✗ ขาดทุน';

  // group by day
  const dayMap = {};
  rows.forEach(r => {
    const lbl = fmtDay(r._date);
    if (!dayMap[lbl]) dayMap[lbl]={income:0,expense:0,day:r._date?r._date.getDate():999};
    const price=parsePrice(r.price||r.ราคา||0);
    const qty=parseQty(r.quantity||r.จำนวน||1);
    const total=price*qty;
    if (isIncome(r.type||r.ประเภท||'')) dayMap[lbl].income+=total;
    else dayMap[lbl].expense+=total;
  });
  const labels = Object.keys(dayMap).sort((a,b)=>dayMap[a].day-dayMap[b].day);

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart').getContext('2d'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'รายรับ', data:labels.map(l=>dayMap[l].income), backgroundColor:'rgba(0,229,160,.7)', borderRadius:4},
        {label:'รายจ่าย', data:labels.map(l=>dayMap[l].expense), backgroundColor:'rgba(255,79,107,.7)', borderRadius:4}
      ]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{labels:{color:'#8a96b0',font:{size:11}}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': ฿'+fmt(c.raw)}}
      },
      scales:{
        x:{ticks:{color:'#8a96b0',font:{size:10}},grid:{color:'#2a3047'}},
        y:{ticks:{color:'#8a96b0',font:{size:10},callback:v=>'฿'+fmt(v)},grid:{color:'#2a3047'}}
      }
    }
  });

  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart').getContext('2d'), {
    type:'doughnut',
    data:{
      labels:['รายรับ','รายจ่าย'],
      datasets:[{data:[tIncome,tExpense],backgroundColor:['rgba(0,229,160,.8)','rgba(255,79,107,.8)'],borderColor:['#00e5a0','#ff4f6b'],borderWidth:2,hoverOffset:6}]
    },
    options:{
      responsive:true, cutout:'65%',
      plugins:{
        legend:{labels:{color:'#8a96b0',font:{size:11}}},
        tooltip:{callbacks:{label:c=>c.label+': ฿'+fmt(c.raw)}}
      }
    }
  });

  // Table
  const sorted = [...rows].sort((a,b)=>(b._date||0)-(a._date||0));
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  if (!sorted.length) {
    tbody.innerHTML='<tr><td colspan="6" class="empty">ไม่มีรายการในเดือนนี้</td></tr>';
    return;
  }
  sorted.forEach(r => {
    const inc = isIncome(r.type||r.ประเภท||'');
    const price=parsePrice(r.price||r.ราคา||0);
    const qty=parseQty(r.quantity||r.จำนวน||1);
    const total=price*qty;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="white-space:nowrap;color:var(--text-dim);font-size:12px">${fmtDay(r._date)}</td>
      <td>${r.item||r.รายการ||r.Item||'-'}</td>
      <td style="text-align:center;color:var(--text-dim)">${qty}</td>
      <td class="${inc?'amount-income':'amount-expense'}">฿${fmt(price)}</td>
      <td class="${inc?'amount-income':'amount-expense'}" style="font-weight:600">฿${fmt(total)}</td>
      <td><span class="badge ${inc?'badge-income':'badge-expense'}">${inc?'รับ':'จ่าย'}</span></td>`;
    tbody.appendChild(tr);
  });
}

setInterval(loadData, 5*60*1000);
loadData();
</script>
</body>
</html>
